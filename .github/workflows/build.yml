name: Build and Test

on:
  push:
    branches: ["master"]
    tags:
      - "v*"
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag, for example v1.0.0"
        required: false
        default: "dev"

jobs:
  test:
    name: Test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke import application
        run: |
          python -c "from app.main import app; print(app.title)"

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -v

  docker-build:
    name: Validate Docker build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for validation
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: team-manage:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Create source release
    needs:
      - test
      - docker-build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create source bundles
        shell: bash
        run: |
          mkdir -p dist
          git archive --format=zip --output="dist/team-manage-${GITHUB_REF_NAME}.zip" "${GITHUB_SHA}"
          git archive --format=tar.gz --output="dist/team-manage-${GITHUB_REF_NAME}.tar.gz" "${GITHUB_SHA}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## team-manage

            ### Release assets
            - `team-manage-${{ github.ref_name }}.zip`
            - `team-manage-${{ github.ref_name }}.tar.gz`

            ### Container image
            The Docker image for this version is published separately by the `docker-publish.yml` workflow to GHCR.
